{% extends 'shared/base.html' %}

{% block title %}Password Changed{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow text-center border-0">
                <div class="card-header bg-success text-white">
                    <h2 class="h5 mb-0">Success</h2>
                </div>
                <div class="card-body p-5">
                    <h4 class="mb-3">Password Changed</h4>
                    <p class="text-muted mb-4">
                        Your password has been changed successfully. You can now continue using your account securely.
                    </p>

                    <a href="{% url 'accounts:detail' pk=request.user.pk %}" class="btn btn-dark px-4">
                        Back to Profile
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
